<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
</head>
<body>

    <h2>Registration Form</h2>

    <form>

        <label>Full Name:</label><br>
        <input type="text" placeholder="Enter your name" required><br><br>

        <label>Email:</label><br>
        <input type="email" placeholder="Enter your email" required><br><br>

        <label>Password:</label><br>
        <input type="password" placeholder="Enter password" required><br><br>

        <label>Phone Number:</label><br>
        <input type="tel" placeholder="Enter phone number"><br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <input type="radio" name="gender"> Other
        <br><br>

        <label>Date of Birth:</label><br>
        <input type="date"><br><br>

        <label>Course:</label><br>
        <select>
            <option>Select Course</option>
            <option>B.Tech</option>
            <option>BCA</option>
            <option>MCA</option>
            <option>B.Sc</option>
        </select>
        <br><br>

        <label>Address:</label><br>
        <textarea rows="4" cols="30" placeholder="Enter your address"></textarea>
        <br><br>

        <input type="checkbox" required>
        I agree to the Terms and Conditions.
        <br><br>

        <input type="submit" value="Register">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
